<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettaglio - Centro Chiesa</title>
    <link rel="shortcut icon" href="assets/img/favicon.png" type="image/x-icon">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="index.html" aria-label="Home page">
                    <img src="assets/img/logo.png" alt="Logo ParolaViva.net">
                    <span class="logo-text">Centro Chiesa</span>
                </a>
            </div>

            <nav>
                <ul>
                    <li><a href="index.html" data-lang-key="nav_home">Home</a></li>
                    <li id="bible-menu-container"></li>
                    <li><a href="chiesa.html" class="active" data-lang-key="nav_church">Chiesa</a></li>
                    <li><a href="catechismo.html" data-lang-key="nav_catechism">Catechismo</a></li>
                </ul>
            </nav>

            <div class="header-controls">
                <button id="lang-it" onclick="setLanguage('it')" class="control-btn" aria-label="Italiano">IT</button>
                <button id="lang-en" onclick="setLanguage('en')" class="control-btn" aria-label="Inglese">EN</button>
                <button id="theme-toggle" class="control-btn" aria-label="Cambia tema"></button>
                <button class="menu-toggle" aria-label="Apri/chiudi menu">
                    <span class="menu-icon-line"></span>
                    <span class="menu-icon-line"></span>
                    <span class="menu-icon-line"></span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <div class="container" style="margin-top: 40px; margin-bottom: 60px;">
            <div style="margin-bottom: 24px;">
                <a href="chiesa.html" class="contact-link" style="display: inline-flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.95rem; min-height: auto; padding: 8px 16px;">
                    ← <span data-lang-key="back_to_church">Torna alla Chiesa</span>
                </a>
            </div>

            <article id="chapter-content" class="church-detail-wrapper" style="margin-top: 0; max-width: 900px;">
                <header class="chapter-header" style="text-align: left; padding-bottom: 1rem;">
                    <p class="eyebrow" data-lang-key="church_detail_eyebrow">Dettaglio Struttura</p>
                    <h1 id="detail-title" style="margin-bottom: 0;">Caricamento...</h1>
                </header>

                <div id="detail-desc" class="chapter-body" style="margin-top: 24px;">
                    <p>Attendere prego, stiamo caricando le informazioni...</p>
                </div>

                <!-- Curiosità -->
                <div id="detail-curiosity-box" class="commentary" style="margin-top: 32px; border-left: 4px solid var(--primary-color);">
                    <h3 style="color: var(--primary-color); display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
                        💡 <span data-lang-key="did_you_know">Lo sapevi che?</span>
                    </h3>
                    <p id="detail-curiosity" style="margin-bottom: 0; font-style: italic; font-size: 1.05rem;"></p>
                </div>

                <!-- Esempi / Lista -->
                <div id="detail-list-box" style="margin-top: 40px;">
                    <h3 style="font-family: var(--font-body); font-size: 1.15rem; font-weight: 700; border-bottom: 2px solid var(--border-color); padding-bottom: 8px; margin-bottom: 16px;" data-lang-key="key_examples">
                        Elementi chiave e Esempi
                    </h3>
                    <ul id="detail-list" style="padding-left: 20px; color: var(--text-secondary-color); line-height: 1.8;">
                        <!-- Verrà popolato dinamicamente -->
                    </ul>
                </div>
            </article>
        </div>
    </main>

    <footer>
        <div class="container">
            <p data-lang-key="footer_text">&copy; 2025 Tommaso Arosio - Centro Chiesa</p>
        </div>
    </footer>

    <!-- SCRIPTS -->
    <script src="assets/js/main.js"></script>
    <script src="assets/js/bible-menu.js"></script>
    <script src="assets/js/lang.js"></script>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/church-detail-loader.js"></script>
</body>
</html>
